apiVersion: apps/v1
kind: Deployment
metadata:
  name: sreagent-memory-demo
  labels:
    app: sreagent-memory-demo
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sreagent-memory-demo
  template:
    metadata:
      labels:
        app: sreagent-memory-demo
    spec:
      containers:
      - name: sreagent-memory-demo
        image: %ACR_NAME%.azurecr.io/sreagent-memory-demo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: INJECT_ERROR
          value: "1"  # Set to "0" to disable error injection
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: appinsights-secret
              key: connection-string
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sreagent-memory-demo-service
spec:
  selector:
    app: sreagent-memory-demo
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: Secret
metadata:
  name: appinsights-secret
type: Opaque
stringData:
  connection-string: ""