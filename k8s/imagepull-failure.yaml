apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagepull-demo
  namespace: default
  labels:
    app: failure-simulation
    scenario: image-pull-backoff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imagepull-demo
  template:
    metadata:
      labels:
        app: imagepull-demo
    spec:
      containers:
      - name: invalid-image
        image: nonexistent-registry.azurecr.io/fake-image:v999
        ports:
        - containerPort: 80
