apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
  namespace: default
  labels:
    app: failure-simulation
    scenario: oom-killed
spec:
  containers:
  - name: memory-stress
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "500M", "--vm-hang", "1"]
    resources:
      limits:
        memory: "100Mi"
      requests:
        memory: "50Mi"
  restartPolicy: Never
